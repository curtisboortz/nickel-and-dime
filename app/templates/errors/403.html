{% extends "base.html" %}

{% block title %}Access Denied — Nickel&amp;Dime{% endblock %}

{% block body %}
<div class="auth-screen">
  <div class="auth-box" style="max-width:400px;">
    <div style="font-size:3rem;margin-bottom:16px;">403</div>
    <h1 style="font-size:1.2rem;margin-bottom:8px;">Pro feature</h1>
    <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:24px;">
      This feature requires a Pro subscription.
    </p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('pages.pricing') if url_for else '/billing/pricing' }}" style="display:inline-block;padding:10px 24px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:#09090b;border-radius:8px;font-weight:600;text-decoration:none;font-size:0.92rem;">
        Upgrade to Pro
      </a>
      <a href="/" style="display:inline-block;padding:10px 24px;background:transparent;color:var(--text-secondary);border:1px solid var(--border-subtle);border-radius:8px;text-decoration:none;font-size:0.92rem;">
        Go Back
      </a>
    </div>
  </div>
</div>
{% endblock %}
